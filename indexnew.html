<title>NRL 2026 Dashboard</title>

<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --danger: #ff4757;
    --warning: #ffa502;
    --success: #2ed573;
    --text: #e8eaf0;
    --muted: #8892a4;
    --border: rgba(255,255,255,0.08);
    --top8: rgba(0,212,170,0.08);
    --bottom: rgba(255,71,87,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  .header {
    background: #0a0e1a;
    border-bottom: 1px solid var(--border);
    padding: 1.25rem;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 0.75rem; }
  .logo-badge { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-badge svg { width: 18px; height: 18px; fill: none; stroke: #0a0e1a; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .logo-text { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 800; letter-spacing: 0.05em; }
  .logo-text span { color: var(--accent); }
  .meta { font-size: 0.72rem; color: var(--muted); margin-left: auto; text-align: right; }

  .dashboard { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }

  .round-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--accent); color: #0a0e1a;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem; font-weight: 800; letter-spacing: 0.08em;
    padding: 0.25rem 0.75rem; border-radius: 20px; margin-bottom: 1.5rem;
  }

  .section { margin-bottom: 2.5rem; }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 1rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .section-title::before { content: ''; display: block; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }

  .fixtures-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 0.75rem; }
  .fixture-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.875rem; transition: border-color 0.2s;
  }
  .fixture-card:hover { border-color: rgba(0,212,170,0.3); }
  .fixture-kickoff { font-size: 0.68rem; color: var(--accent); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .fixture-teams { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.5rem; }
  .fixture-home { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; flex: 1; }
  .fixture-vs { font-size: 0.68rem; color: var(--muted); font-weight: 600; }
  .fixture-away { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; color: var(--muted); flex: 1; text-align: right; }
  .fixture-venue { font-size: 0.72rem; color: var(--muted); }
  .fixture-city { color: var(--accent2); font-weight: 500; }
  .home-tag { font-size: 0.58rem; background: rgba(0,212,170,0.15); color: var(--accent); padding: 1px 4px; border-radius: 3px; font-weight: 600; vertical-align: middle; }

  .byes-row { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .bye-pill {
    background: rgba(255,165,2,0.12); border: 1px solid rgba(255,165,2,0.25);
    color: var(--warning); font-size: 0.78rem; font-weight: 600;
    padding: 0.25rem 0.7rem; border-radius: 20px;
  }

  .ladder-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .ladder-table th {
    text-align: left; padding: 0.55rem 0.65rem;
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .ladder-table td { padding: 0.5rem 0.65rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .ladder-table tr:last-child td { border-bottom: none; }
  .ladder-table tr.top8 td { background: var(--top8); }
  .ladder-table tr.bottom td { background: var(--bottom); }
  .ladder-table tr.top8-line td { border-bottom: 2px solid rgba(0,212,170,0.35) !important; }
  .pos-num { font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; font-weight: 800; color: var(--muted); }
  .pos-num.top4 { color: var(--accent); }
  .team-name-cell { font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; font-weight: 700; }
  .pts-cell { font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; font-weight: 800; color: var(--accent); }
  .streak-win { color: var(--success); font-weight: 600; }
  .streak-loss { color: var(--danger); font-weight: 600; }
  .diff-pos { color: var(--success); }
  .diff-neg { color: var(--danger); }

  .stats-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .sort-hint { font-size: 0.68rem; color: var(--muted); font-style: italic; margin-bottom: 0.5rem; }
  .stats-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 860px; }
  .stats-table th {
    padding: 0.55rem 0.55rem; text-align: right;
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.68rem;
    font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted); border-bottom: 1px solid var(--border);
    cursor: pointer; white-space: nowrap; user-select: none; transition: color 0.15s;
  }
  .stats-table th:hover { color: var(--accent); }
  .stats-table th.sorted { color: var(--accent); }
  .stats-table th:first-child { text-align: left; }
  .stats-table td { padding: 0.45rem 0.55rem; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .stats-table td:first-child { text-align: left; font-family: 'Barlow Condensed', sans-serif; font-size: 0.88rem; font-weight: 700; }
  .stats-table tr:hover td { background: rgba(255,255,255,0.02); }
  .stats-table tr:last-child td { border-bottom: none; }
  .val-best { color: var(--success); font-weight: 600; }
  .val-worst { color: var(--danger); }
  .val-warn { color: var(--warning); }

  @media (max-width: 600px) {
    .fixtures-grid { grid-template-columns: 1fr; }
    .ladder-table td, .ladder-table th { padding: 0.4rem 0.45rem; }
  }
</style>
</head>

<div class="header">

    <div class="logo-badge">

    </div>

    <div class="meta" id="metaLine" style="font-size:1rem;font-weight:600;color:var(--text)">Loading...</div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div id="roundBadge"></div>
  <div class="section" id="fixturesSection">

  </div>
  <div class="section" id="byesSection" style="display:none">

  </div>
  <div class="section">

            <th>PF</th><th>PA</th><th>Diff</th><th>Streak</th>
          </tr>
        </thead>
        <tbody id="ladderBody"></tbody>
      </table>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Team Season Averages</div>
    <div class="sort-hint">Tap any column header to sort by that stat</div>
    <div class="stats-wrapper">
      <table class="stats-table">
        <thead>

            <th onclick="sortStats('run_metres_avg')">Run Metres</th>
            <th onclick="sortStats('post_contact_metres_avg')">Post Con M</th>
            <th onclick="sortStats('completion_rate_avg')">Comp Rate %</th>
            <th onclick="sortStats('missed_tackles_avg')">Miss Tackles</th>
            <th onclick="sortStats('errors_avg')">Errors</th>
            <th onclick="sortStats('penalties_avg')">Penalties</th>
            <th onclick="sortStats('line_breaks_avg')">Line Breaks</th>
            <th onclick="sortStats('possession_avg')">Poss %</th>
            <th onclick="sortStats('kick_metres_avg')">Kick Metres</th>
            <th onclick="sortStats('tackle_efficiency_avg')">Tackle Eff %</th>
            <th onclick="sortStats('ptb_speed_avg')">PTB Speed</th>
          </tr>
        </thead>
        <tbody id="statsBody"></tbody>
      </table>
    </div>
  </div>
</div>

var statsData = [];
var sortKey = 'run_metres_avg';
var sortAsc = false;
var lowerBetter = ['missed_tackles_avg','errors_avg','penalties_avg','ptb_speed_avg'];

function init() {
  if (!NRL_DATA) {
    document.getElementById('metaLine').textContent = 'No data loaded';
    return;
  }
  var data = NRL_DATA;
  var round = data.upcoming_round || '?';
  var scraped = data.scraped_date || '';
  document.getElementById('metaLine').textContent = 'Round ' + round + ' \u00b7 Scraped ' + scraped;
  document.getElementById('roundBadge').innerHTML = '<div class="round-badge">Round ' + round + ' Analysis</div>';

  var fixturesKey = 'round_' + round + '_fixtures';
  var fixtures = data[fixturesKey] || [];
  var grid = document.getElementById('fixturesGrid');
  grid.innerHTML = '';
  fixtures.forEach(function(f) {
    var card = document.createElement('div');
    card.className = 'fixture-card';
    card.innerHTML =
      '<div class="fixture-kickoff">' + (f.kickoff_nzt || '') + '</div>' +
      '<div class="fixture-teams">' +
        '<div class="fixture-home">' + f.home_team + ' <span class="home-tag">HOME</span></div>' +
        '<div class="fixture-vs">vs</div>' +
        '<div class="fixture-away">' + f.away_team + '</div>' +
      '</div>' +
      '<div class="fixture-venue">' + f.venue + ' \u00b7 <span class="fixture-city">' + f.city + '</span></div>';
    grid.appendChild(card);
  });

  var byesKey = 'round_' + round + '_byes';
  var byes = data[byesKey] || [];
  if (byes.length > 0) {
    document.getElementById('byesSection').style.display = 'block';
    var byesRow = document.getElementById('byesRow');
    byesRow.innerHTML = '';
    byes.forEach(function(b) {
      var pill = document.createElement('div');
      pill.className = 'bye-pill';
      pill.textContent = (b.team || 'Unknown') + ' \u2014 BYE';
      byesRow.appendChild(pill);
    });
  }

  var ladder = data.ladder || [];
  var tbody = document.getElementById('ladderBody');
  tbody.innerHTML = '';
  ladder.forEach(function(t) {
    var tr = document.createElement('tr');
    var pos = t.position;
    if (pos <= 8) tr.classList.add('top8');
    else tr.classList.add('bottom');
    if (pos === 8) tr.classList.add('top8-line');
    var streak = t.streak || '';
    var streakClass = streak.indexOf('W') >= 0 ? 'streak-win' : 'streak-loss';
    var diff = t.points_difference;
    var diffClass = diff > 0 ? 'diff-pos' : diff < 0 ? 'diff-neg' : '';
    var posClass = pos <= 4 ? 'pos-num top4' : 'pos-num';
    tr.innerHTML =
      '<td class="' + posClass + '">' + pos + '</td>' +
      '<td class="team-name-cell">' + t.team + '</td>' +
      '<td class="pts-cell">' + t.points + '</td>' +
      '<td>' + t.wins + '</td>' +
      '<td>' + t.losses + '</td>' +
      '<td>' + t.drawn + '</td>' +
      '<td>' + t.points_for + '</td>' +
      '<td>' + t.points_against + '</td>' +
      '<td class="' + diffClass + '">' + (diff > 0 ? '+' : '') + diff + '</td>' +
      '<td class="' + streakClass + '">' + streak + '</td>';
    tbody.appendChild(tr);
  });

  var avgs = data.team_season_averages || {};
  statsData = Object.keys(avgs).map(function(team) {
    return Object.assign({ team: team }, avgs[team]);
  });
  renderStats();
}

function getExtremes(key) {
  var vals = statsData.map(function(r) { return r[key]; }).filter(function(v) { return v !== undefined; });
  return { min: Math.min.apply(null, vals), max: Math.max.apply(null, vals) };
}

function renderStats() {
  var tbody = document.getElementById('statsBody');
  tbody.innerHTML = '';
  var sorted = statsData.slice().sort(function(a, b) {
    if (sortKey === 'team') return sortAsc ? a.team.localeCompare(b.team) : b.team.localeCompare(a.team);
    return sortAsc ? a[sortKey] - b[sortKey] : b[sortKey] - a[sortKey];
  });

  var keys = ['run_metres_avg','post_contact_metres_avg','completion_rate_avg',
    'missed_tackles_avg','errors_avg','penalties_avg','line_breaks_avg',
    'possession_avg','kick_metres_avg','tackle_efficiency_avg','ptb_speed_avg'];

  var extremes = {};
  keys.forEach(function(k) { extremes[k] = getExtremes(k); });

  sorted.forEach(function(row) {
    var tr = document.createElement('tr');
    var html = '<td>' + row.team + '</td>';
    keys.forEach(function(k) {
      var val = row[k];
      var ext = extremes[k];
      var cls = '';
      var isLower = lowerBetter.indexOf(k) >= 0;
      if (isLower) {
        if (val === ext.min) cls = 'val-best';
        else if (val === ext.max) cls = 'val-worst';
      } else {
        if (val === ext.max) cls = 'val-best';
        else if (val === ext.min) cls = 'val-worst';
      }
      if (k === 'completion_rate_avg' && val < 74) cls = 'val-warn';
      html += '<td class="' + cls + '">' + val + '</td>';
    });
    tr.innerHTML = html;
    tbody.appendChild(tr);
  });

  document.querySelectorAll('.stats-table th').forEach(function(th) { th.classList.remove('sorted'); });
  var keyMap = ['team','run_metres_avg','post_contact_metres_avg','completion_rate_avg',
    'missed_tackles_avg','errors_avg','penalties_avg','line_breaks_avg',
    'possession_avg','kick_metres_avg','tackle_efficiency_avg','ptb_speed_avg'];
  var idx = keyMap.indexOf(sortKey);
  var ths = document.querySelectorAll('.stats-table th');
  if (idx >= 0 && ths[idx]) ths[idx].classList.add('sorted');
}

function sortStats(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = false; }
  renderStats();
}

window.onload = init;
</script>
